<!doctype html>
<html lang="en-US">

<head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://use.typekit.net" />
    <link rel="stylesheet" href="https://use.typekit.net/uix3gbn.css" />
    <link rel="icon" href="./logo.svg" />

    <title>Creative Planning - System Status</title>

    <style>
        :root
        {
            --primary-text-color: #165D7D;
            --info-text-color: #1E1E1E;
            --update-text-color: rgba(0, 0, 0, 0.2);
            font-family: "new-atten", sans-serif;
            color: var(--info-text-color);
        }

        div
        {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        main
        {
            display: grid;
            grid-template-areas: ". logo text .";
            grid-template-columns: auto 188px 80ch auto;

            img
            {
                grid-area: logo;
                position: relative;
                right: 66px;
                bottom: 15px;
            }

            hgroup
            {
                grid-area: text;
                align-items: center;
                padding-top: 5%;
                padding-left: 5%;

                h1
                {
                    color: var(--primary-text-color);
                    font-size: 40px;
                    margin: 0;
                    margin-top: 0.25lh;
                }

                p
                {
                    font-size: 32px;
                    margin-bottom: 1lh;
                    margin: 0;
                    /* white-space: nowrap; */

                    &:nth-of-type(1) {  margin-top: 0.25lh; }
                }
            }


        }

    </style>
</head>

<body>
    <div>
        <main>
            <img src="./logo.svg" />
            <hgroup>
                <h1>System Status</h1>
                <p>We are aware of an issue affecting system availability.</p>
                <p>Our team is actively working to resolve this.</p>
                <p>Please check back shortly for updates.</p>
            </hgroup>
        </main>
    </div>
</body>

</html>
